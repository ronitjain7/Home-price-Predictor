<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}India Property AI{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1a2a 0%, #1a2f3f 100%);
            min-height: 100vh;
            color: #1e293b;
        }
        .navbar {
            background: rgba(15, 43, 61, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .navbar-brand i { color: #ffd966; }
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        .nav-link {
            color: #a8c1d1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .nav-link:hover, .nav-link.active {
            color: white;
        }
        .nav-link.active i { color: #ffd966; }
        
        .main-wrapper {
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app-container { max-width: 1200px; width: 100%; }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35), inset 0 1px 2px rgba(255,255,255,0.3);
            border: 1px solid rgba(255, 255, 255, 0.25);
            overflow: hidden;
        }
        .header {
            padding: 2rem 2.5rem;
            background: linear-gradient(135deg, #0f2b3d 0%, #1b3a4e 100%);
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .subhead {
            margin-top: 0.8rem;
            opacity: 0.85;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .content { padding: 2.5rem; }
        .footer {
            padding: 1.5rem 2.5rem;
            background: #f8fbfd;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            color: #42697e;
            font-size: 0.85rem;
        }
        .btn {
            background: linear-gradient(145deg, #1e5a78, #0e3e54);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
            transition: all 0.25s;
            box-shadow: 0 10px 20px -8px rgba(14, 62, 84, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 25px -10px rgba(14, 62, 84, 0.5);
        }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 1rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .main-wrapper { padding: 1rem; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand"><i class="fas fa-home"></i> India Property AI</a>
    <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' or request.path == '/predict' %}active{% endif %}">
            <i class="fas fa-calculator"></i> Predictor
        </a>
        <a href="/insights" class="nav-link {% if request.path == '/insights' %}active{% endif %}">
            <i class="fas fa-chart-bar"></i> Feature Insights
        </a>
        <a href="/simulator" class="nav-link {% if request.path == '/simulator' %}active{% endif %}">
            <i class="fas fa-magic"></i> Renovation Simulator
        </a>
    </div>
</nav>

<div class="main-wrapper">
    <div class="app-container">
        <div class="glass-card">
            {% block content %}{% endblock %}
            <div class="footer">
                <span><i class="far fa-copyright"></i> 2026 India Property AI</span>
                <span>Powered by {{ best_model }}</span>
            </div>
        </div>
    </div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
